services:
  client:
    image: bloglist-front-dev
    build:
      context: client # The context will pick this directory as the "build context"
      dockerfile: dev.Dockerfile # This will simply tell which dockerfile to read
    volumes:
      - ./client:/usr/src/app # The path can be relative, so ./ is enough to say "the same location as the docker-compose.yml"
    # ports:
      # - 5173:5173
    container_name: bloglist-front-dev # This will name the container hello-front-dev
    environment:
      - CHOKIDAR_USEPOLLING=true

  server:
    image: bloglist-back-dev
    build:
      context: server # The context will pick this directory as the "build context"
      dockerfile: dev.Dockerfile # This will simply tell which dockerfile to read
    volumes:
      - ./server:/usr/src/app # The path can be relative, so ./ is enough to say "the same location as the docker-compose.yml"
    # ports:
      # - 3000:3000
    container_name: bloglist-back-dev # This will name the container hello-front-dev
    environment:
      - CHOKIDAR_USEPOLLING=true

  nginx:
    image: nginx:1.29
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:80
    container_name: reverse-proxy
    depends_on:
      - client # wait for the frontend container to be started
      - server
